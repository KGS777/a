<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크린 골프장 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">스크린 골프장 정보</h1>
        
        <!-- 매장 1 -->
        <div class="mb-8 p-4 border rounded-lg hover:shadow-lg transition-shadow">
            <h2 class="text-lg font-semibold text-blue-600">골프존파크 장항 K스크린점</h2>
            <p class="text-sm text-gray-600 mt-1">경기도 고양시 일산동구 중앙로1261번길 61, 5층</p>
            <a href="https://www.google.com/maps/search/?api=1&query=골프존파크+장항+k스크린점" 
               class="mt-4 block text-center bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">지도에서 위치 확인</a>
        </div>

        <!-- 매장 2 -->
        <div class="p-4 border rounded-lg hover:shadow-lg transition-shadow">
            <h2 class="text-lg font-semibold text-blue-600">골프존파크 장항 발리스크린골프</h2>
            <p class="text-sm text-gray-600 mt-1">경기도 고양시 일산동구 무궁화로 34</p>
            <a href="https://www.google.com/maps/search/?api=1&query=골프존파크+장항발리스크린골프" 
               class="mt-4 block text-center bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">지도에서 위치 확인</a>
        </div>
        
        <p class="text-center text-gray-400 text-xs mt-8">공유해 드린 링크를 눌러 상세 위치를 확인하세요.</p>
    </div>
</body>
</html>
